name: Android APK Derleyici
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Java JDK 17 Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Güncel Gradle Sistemini Kur
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: current # Sistemdeki en güncel, kararlı Gradle sürümünü otomatik seçer

      - name: Doğrudan Sistem Gradle'ı ile APK Derle
        run: gradle assembleDebug --no-daemon --no-build-cache

      - name: APK Dosyasını Çıkart
        uses: actions/upload-artifact@v4
        with:
          name: manga-translate-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          
