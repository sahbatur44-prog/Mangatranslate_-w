name: Android APK Derleyici

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Java JDK 17 Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Debug Keystore Oluştur
        run: |
          mkdir -p "$GITHUB_WORKSPACE"
          keytool -genkey -v \
            -keystore "$GITHUB_WORKSPACE/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "✅ debug.keystore oluşturuldu: $GITHUB_WORKSPACE/debug.keystore"
          ls -la "$GITHUB_WORKSPACE/debug.keystore"

      - name: Gradle Wrapper İzni Ver
        run: chmod +x ./gradlew

      - name: APK Derle
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: APK Dosyasını Çıkart
        uses: actions/upload-artifact@v4
        with:
          name: manga-translate-debug-apk
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            manga_cevirmen.apk
          if-no-files-found: warn
